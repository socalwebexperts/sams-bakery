media:
  - name: uploads
    label: Uploads
    input: public/media/uploads
    output: /media/uploads
    categories: [image]
    rename: true
    extensions: [jpg, jpeg, png, webp, gif]

content:
  - name: items
    label: Items
    type: collection
    path: src/content/items
    format: yaml-frontmatter
    filename:
      template: "{primary}.md"
      field: false
    view:
      primary: title
      fields: [title]
      sort:
        field: title
        direction: asc
    fields:
      - name: title
        label: Title
        type: string
        required: true
        options:
          maxlength: 120

settings:
  content:
    merge: true
  commit:
    templates:
      create: "content: add {filename}"
      update: "content: update {filename}"
      delete: "content: remove {filename}"
