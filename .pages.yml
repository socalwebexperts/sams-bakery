media:
  - name: portfolio-images
    label: Portfolio Images
    input: public/media/portfolio
    output: /media/portfolio
    categories: [image]
    rename: true
    extensions: [jpg, jpeg, png, webp, gif]

content:
  - name: portfolio
    label: Portfolio
    type: collection
    path: src/content/portfolio
    format: yaml-frontmatter
    filename:
      template: "{fields.urlName}.md"
      field: false
    view:
      primary: title
      fields: [title, category, portfolioGroup, status, year, urlName]
      sort:
        field: title
        direction: asc
    fields:
      - name: urlName
        label: Project file name
        type: string
        required: true
        description: "Name only (no .md). Spaces become dashes in the file and URL (e.g. My New Build → my-new-build.md). Set once when creating; to change the URL, rename the file in Git."

      - name: title
        label: Project title
        type: string
        required: true
        description: "ALL CAPS on the site (e.g. 1860 LINDA VISTA)."
        options:
          maxlength: 120

      - name: category
        label: Category
        type: select
        required: true
        options:
          values:
            - name: residential
              label: Residential
            - name: commercial
              label: Commercial

      - name: portfolioGroup
        label: Portfolio Section
        type: select
        required: true
        description: "Which section this project appears under on the portfolio page."
        options:
          values:
            - name: residential
              label: Residential Projects
            - name: adu
              label: ADU Projects
            - name: commercial
              label: Commercial Projects

      - name: location
        label: Location
        type: string
        required: true
        description: "ALL CAPS on the site (e.g. LOS ANGELES, CA)."

      - name: year
        label: Year
        type: string
        required: true
        description: "Year or year range (e.g. 2024 or 2024–2025)"

      - name: status
        label: Status
        type: select
        required: true
        options:
          values:
            - name: Completed
              label: Completed
            - name: In Progress
              label: In Progress

      - name: heroImage
        label: Hero image
        type: image
        required: true
        description: "Used for the hero and for portfolio cards (thumbnail)."
        options:
          media: portfolio-images
          extensions: [jpg, jpeg, png, webp]

      - name: description
        label: Short Description
        type: text
        required: true
        description: "Brief project summary shown on portfolio listings."

      - name: details
        label: Project Details
        type: text
        description: "Extended project description shown on the detail page."

      - name: scope
        label: Scope of Work
        type: string
        description: "Comma-separated list of services (e.g. Architecture, Interior Design, Plans)"

      - name: gallery
        label: Gallery
        type: image
        description: "Project gallery images. Upload photos and videos for the project gallery."
        options:
          media: portfolio-images
          multiple:
            max: 20
          unique: true
          extensions: [jpg, jpeg, png, webp]

  - name: site-settings
    label: Site Settings
    type: file
    path: src/data/site-settings.json
    format: json
    fields:
      - name: siteName
        label: Site Name
        type: string
      - name: tagline
        label: Tagline
        type: string
      - name: description
        label: Site Description
        type: text
      - name: logoUrl
        label: Logo URL
        type: string
      - name: contactEmail
        label: Contact Email
        type: string
      - name: contactPhone
        label: Contact Phone
        type: string
      - name: contactLocation
        label: Location
        type: string

settings:
  content:
    merge: true
  commit:
    templates:
      create: "content: add {filename}"
      update: "content: update {filename}"
      delete: "content: remove {filename}"
