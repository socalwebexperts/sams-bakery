# Sam's Armenian Bakery — Pagers CMS (keep in sync with src/content.config.ts)
# Uploads: public/media/uploads → site URL /media/uploads/...
media:
  - name: uploads
    label: Menu & site uploads
    input: public/media/uploads
    output: /media/uploads
    categories: [image]
    rename: true
    extensions: [jpg, jpeg, png, webp, gif]

content:
  - name: menu
    label: Menu items
    type: collection
    path: src/content/menu
    format: yaml-frontmatter
    filename:
      template: "{primary}.md"
      primary: title
    view:
      primary: title
      fields: [title, category, price, image]
    fields:
      - name: title
        label: Item name
        type: string
        required: true
        options:
          maxlength: 200
      - name: description
        label: Description
        type: string
        required: false
        options:
          maxlength: 500
      - name: price
        label: Price
        type: string
        required: true
        hint: "Examples — $2.50  |  $10.50 / lb  |  $2.00 each"
        options:
          maxlength: 40
      - name: category
        label: Menu section
        type: select
        required: true
        options:
          - value: "Frozen food"
            label: Frozen food
          - value: "Pastry"
            label: Pastry
          - value: "Boreks"
            label: Boreks
          - value: "Hot food"
            label: Hot food
          - value: "Drinks"
            label: Drinks
      # If `type: image` errors in your Pagers build, use type: string (same hint).
      - name: image
        label: Image
        type: image
        media: uploads
        required: false
        hint: "Optional. One image per item, saved under public/media/uploads (use /media/uploads/filename.ext)."
        options:
          maxlength: 500

settings:
  content:
    merge: true
  commit:
    templates:
      create: "content: add menu item {filename}"
      update: "content: update menu item {filename}"
      delete: "content: remove menu item {filename}"
